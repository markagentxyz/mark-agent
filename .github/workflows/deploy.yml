name: Deploy MARK Agent

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 188.212.125.63
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/mark-agent
            git pull origin main
            npm install --production
            pm2 restart ecosystem.config.cjs
            echo "$(date): Deployed commit $(git rev-parse --short HEAD)" >> /opt/mark-agent/logs/deploy.log
